<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/png" href="logo.png?v=1">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click & Clasp | Order Form</title>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
/* Matching Aesthetics */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap');

:root {
    --bg-gradient-start: #0a232a;
    --bg-gradient-end: #0e333d;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --btn-bg: #f5efe4; 
    --btn-text: #1a2e35;
    --text-light: #ffffff;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at center, var(--bg-gradient-end) 0%, var(--bg-gradient-start) 100%);
    color: white;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
}

.container {
    width: 100%;
    max-width: 440px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 40px 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    text-align: center;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.85rem;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0;
    color: var(--text-light);
}

h2 {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 6px;
    margin-bottom: 30px;
}

input, select, textarea {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    font-family: 'Inter', sans-serif;
}

/* Primary Button Styling */
button {
    width: 100%;
    padding: 16px;
    margin-top: 15px;
    border: none;
    border-radius: 50px;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #eae1d0;
    transform: translateY(-2px);
}

.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
    text-align: left;
}

.card h3 {
    font-family: 'Playfair Display', serif;
    margin-top: 0;
}

#total {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin: 25px 0;
}

/* Mobile Adjustments */
@media (max-width:480px){
    .container { padding: 30px 20px; }
}
</style>
</head>
<body>

<div class="container">
    <h1>Click & Clasp</h1>
    <h2>Order Form</h2>

    <div id="date" style="font-size: 12px; opacity: 0.6; margin-bottom: 5px;"></div>
    <div id="order" style="font-size: 12px; opacity: 0.6; margin-bottom: 20px;"></div>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email/Instagram">
    <input id="school" placeholder="School">
    <input id="grade" placeholder="Grade">
    <input id="section" placeholder="Section">

    <div id="items"></div>

    <button onclick="addItem()">+ Add Keychain</button>
    <h3 id="total">Total: ₱0</h3>
    <button id="submitBtn" onclick="submitOrder()">Submit Order</button>
</div>

<script>
// Keep your existing JavaScript functionality here
emailjs.init("tp0-EdHc-e3iYbotR");
let orderNum = Math.floor(Math.random()*90000)+10000;
document.getElementById("order").innerText = "Order #: " + orderNum;
document.getElementById("date").innerText = "Date: " + new Date().toLocaleDateString();
let itemCount = 0;

function addItem(){
    itemCount++;
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
        ${itemCount > 1 ? `<button class="remove-btn" onclick="removeItem(this)">×</button>` : ""}
        <h3>Item ${itemCount}</h3>
        <select onchange="toggleSections(this)">
            <option value="design">Pre-made (₱30)</option>
            <option value="custom">Custom (₱40)</option>
        </select>
        <div class="designSection" style="display:block">
            <div class="design-row"><div class="designs">${[1,2,3,4,5,6,7,8].map(n=>`<img src="design${n}.png" data-name="design${n}" onclick="selectDesign(this)">`).join("")}</div></div>
        </div>
        <div class="customSection" style="display:none;"><textarea placeholder="Custom Request..."></textarea></div>
    `;
    document.getElementById("items").appendChild(div);
    updateTotal();
}
// ... (Include your existing handleFiles, selectDesign, submitOrder, etc., here)
addItem();
</script>
</body>
</html>
