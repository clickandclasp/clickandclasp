<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click & Clasp | Socials & Contact</title>
    
    <!-- Favicon link with version tag to force browser refresh -->
    <link rel="icon" type="image/png" href="logo.png?v=1">
    
    <!-- FontAwesome for clean social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Exact font imports from your order form */
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

        /* Exact background styling from your order form */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: 
                radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%),
                linear-gradient(180deg, #0b2d3a, #102d40, #0a2230);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 25px 14px;
            box-sizing: border-box;
        }

        /* Exact main container styling from your order form */
        .container {
            width: 100%;
            max-width: 440px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 40px 24px;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.28),
                inset 0 1px 0 rgba(255,255,255,0.06);
            box-sizing: border-box;
        }

        /* Logo Spacing Adjustment */
        .logo {
            width: 75px;
            height: auto;
            margin-bottom: 20px;
        }

        /* Exact H1 styling from your order form */
        h1 {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            letter-spacing: 4px;
            margin-top: 0;
            margin-bottom: 0;
            font-weight: 600;
            color: #ffffff;
        }

        /* Exact H2 styling from your order form */
        h2 {
            font-family: 'Inter', sans-serif;
            letter-spacing: 5px;
            font-size: 13px;
            font-weight: 400;
            margin-top: 6px;
            margin-bottom: 35px;
            opacity: 0.8;
            text-align: center;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Links styled EXACTLY like your order form's sleek input fields */
        .link-item {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            box-sizing: border-box;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 14px;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            transition: 0.25s ease;
            border: 1px solid rgba(255,255,255,0.12);
            text-align: left;
        }

        .link-item i {
            font-size: 16px;
            width: 25px;
            opacity: 0.85;
        }

        .link-item span {
            flex-grow: 1;
            padding-left: 5px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Matching the subtle interactive hover from your form inputs */
        .link-item:hover {
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px);
        }

        /* Exact footer text styles */
        .footer {
            margin-top: 40px;
            font-size: 11px;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        /* Exact responsive breakpoints from your order form */
        @media (max-width: 480px) {
            .container {
                padding: 35px 20px;
                border-radius: 24px;
            }
            h1 {
                font-size: 34px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>CLICK & CLASP</h1>
    <h2>SOCIALS & CONTACT</h2>

    <!-- Navigation Stack -->
    <div class="links-wrapper">
        
        <!-- Instagram -->
        <a href="https://www.instagram.com/clickandclasp_/" target="_blank" class="link-item">
            <i class="fa-brands fa-instagram"></i>
            <span>Instagram</span>
        </a>

        <!-- Facebook Page -->
        <a href="https://www.facebook.com/profile.php?id=61590269607111" target="_blank" class="link-item">
            <i class="fa-brands fa-facebook-f"></i>
            <span>Facebook Page</span>
        </a>

        <!-- Reviews -->
        <a href="https://www.facebook.com/share/g/1CsQDj5F3F/" target="_blank" class="link-item">
            <i class="fa-regular fa-star"></i>
            <span>Customer Reviews</span>
        </a>

        <!-- Email -->
        <a href="mailto:clickandclasp@gmail.com" class="link-item">
            <i class="fa-regular fa-envelope"></i>
            <span>clickandclasp@gmail.com</span>
        </a>

        <!-- Mobile Number -->
        <a href="tel:09936901203" class="link-item">
            <i class="fa-solid fa-phone"></i>
            <span>0993 690 1203</span>
        </a>

    </div>

    <!-- Footer Tagline -->
    <div class="footer">
        &copy; 2026 Click & Clasp. All rights reserved.
    </div>

</div>

</body>
</html>
